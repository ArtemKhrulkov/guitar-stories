services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      target: development
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://postgres:postgres@db:5432/guitar_stock
      - GIN_MODE=debug
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_go_cache:/go/pkg
    command: air -c .air.toml

  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "3000:3000"
      - "24678:24678"
    environment:
      - NUXT_PUBLIC_API_URL=http://backend:8080/api
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=guitar_stock
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  backend_go_cache:
  frontend_node_modules:
